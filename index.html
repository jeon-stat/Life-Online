<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Life Online</title>
    <style>
      :root {
        --ink: #243042;
        --soft-ink: #627182;
        --navy: #27364d;
        --sky: #bde7ff;
        --cream: #fff7df;
        --peach: #ffd6e9;
        --card: rgba(255, 255, 255, 0.82);
        font-family: Georgia, "Times New Roman", "Malgun Gothic", serif;
        color: var(--ink);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(255, 247, 191, 0.96), transparent 30%),
          linear-gradient(135deg, var(--sky), var(--cream) 48%, var(--peach));
      }

      .app {
        width: min(392px, calc(100vw - 20px));
        min-height: 760px;
        padding: 20px;
        border: 8px solid var(--navy);
        border-radius: 34px;
        background: linear-gradient(#fffdf7, #eef8ff);
        box-shadow: 0 28px 80px rgba(28, 37, 55, 0.28);
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .brand {
        margin: 0;
        font-size: 13px;
        font-weight: 900;
        color: var(--soft-ink);
      }

      .level {
        min-width: 76px;
        padding: 10px 12px;
        border-radius: 999px;
        background: var(--navy);
        color: white;
        text-align: center;
        font-family: Arial, sans-serif;
        font-weight: 900;
      }

      .hero {
        display: grid;
        place-items: center;
        min-height: 390px;
        padding-top: 18px;
      }

      .character-card {
        width: 264px;
        min-height: 344px;
        display: grid;
        place-items: center;
        border-radius: 28px;
        background: linear-gradient(180deg, #dff7ff, #fff0af);
        box-shadow:
          inset 0 -18px 40px rgba(255, 181, 85, 0.28),
          0 20px 44px rgba(78, 95, 125, 0.18);
      }

      .character {
        position: relative;
        width: 156px;
        height: 262px;
        animation: floaty 3.5s ease-in-out infinite;
      }

      .piece {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        box-shadow:
          inset -12px -12px 20px rgba(67, 47, 76, 0.14),
          inset 10px 10px 18px rgba(255, 255, 255, 0.55);
      }

      .hair {
        top: 8px;
        width: 112px;
        height: 88px;
        border-radius: 48% 52% 46% 46%;
        background: #6b4b3a;
        z-index: 1;
      }

      .head {
        top: 36px;
        width: 104px;
        height: 104px;
        border-radius: 44% 44% 48% 48%;
        background: #ffd9bc;
        z-index: 2;
      }

      .eye,
      .cheek,
      .smile {
        position: absolute;
        z-index: 4;
      }

      .eye {
        top: 72px;
        width: 12px;
        height: 15px;
        border-radius: 50%;
        background: #293047;
      }

      .eye.left {
        left: 51px;
      }

      .eye.right {
        right: 51px;
      }

      .cheek {
        top: 96px;
        width: 20px;
        height: 10px;
        border-radius: 999px;
        background: #ff9fba;
        opacity: 0.82;
      }

      .cheek.left {
        left: 36px;
      }

      .cheek.right {
        right: 36px;
      }

      .smile {
        top: 102px;
        left: 68px;
        width: 20px;
        height: 12px;
        border-bottom: 3px solid #293047;
        border-radius: 0 0 999px 999px;
      }

      .body {
        top: 136px;
        width: 112px;
        height: 94px;
        border-radius: 36px 36px 42px 42px;
        background: linear-gradient(135deg, #79dcff, #8d7dff);
        z-index: 2;
      }

      .arm {
        top: 148px;
        width: 34px;
        height: 86px;
        border-radius: 999px;
        background: #ffd9bc;
        z-index: 1;
      }

      .arm.left {
        left: 22px;
        transform: rotate(18deg);
      }

      .arm.right {
        left: auto;
        right: 22px;
        transform: rotate(-18deg);
      }

      .leg {
        top: 216px;
        width: 36px;
        height: 52px;
        border-radius: 18px;
        background: #5f6dff;
        z-index: 1;
      }

      .leg.left {
        left: 50px;
      }

      .leg.right {
        left: auto;
        right: 50px;
      }

      .shadow {
        position: absolute;
        left: 22px;
        bottom: -8px;
        width: 112px;
        height: 22px;
        border-radius: 999px;
        background: rgba(39, 54, 77, 0.16);
        filter: blur(2px);
      }

      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.05;
      }

      .subtitle {
        margin: 8px 0 18px;
        color: var(--soft-ink);
        font-family: Arial, sans-serif;
        font-weight: 800;
      }

      .stats,
      .actions {
        display: grid;
        gap: 8px;
      }

      .stats {
        grid-template-columns: repeat(3, 1fr);
        margin-bottom: 14px;
      }

      .stat {
        padding: 12px 8px;
        border: 1px solid #dce5f0;
        border-radius: 8px;
        background: var(--card);
        text-align: center;
      }

      .stat span {
        display: block;
        color: #7b8798;
        font-size: 12px;
        font-family: Arial, sans-serif;
        font-weight: 900;
      }

      .stat strong {
        display: block;
        margin-top: 5px;
        font-size: 20px;
        font-family: Arial, sans-serif;
      }

      .actions {
        grid-template-columns: repeat(5, 1fr);
      }

      button {
        min-height: 52px;
        border: 0;
        border-radius: 8px;
        background: var(--navy);
        color: white;
        font-family: Arial, sans-serif;
        font-weight: 900;
        cursor: pointer;
      }

      .log {
        margin-top: 14px;
        padding: 12px;
        border-radius: 8px;
        background: white;
        color: #5d6879;
        font-family: Arial, sans-serif;
        font-size: 14px;
        font-weight: 800;
      }

      @media (max-width: 420px) {
        .app {
          min-height: 100vh;
          border-width: 0;
          border-radius: 0;
          padding: 18px;
        }
      }

      @keyframes floaty {
        0%,
        100% {
          transform: rotateY(-8deg) translateY(0);
        }

        50% {
          transform: rotateY(8deg) translateY(-10px);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="topbar">
        <p class="brand">Life Online TEST</p>
        <div class="level">LV <span id="level">1</span></div>
      </div>

      <section class="hero" aria-label="메인 캐릭터 화면">
        <div class="character-card">
          <div class="character" aria-label="귀여운 3D 사람 캐릭터">
            <span class="piece hair"></span>
            <span class="piece head"></span>
            <span class="eye left"></span>
            <span class="eye right"></span>
            <span class="cheek left"></span>
            <span class="cheek right"></span>
            <span class="smile"></span>
            <span class="piece arm left"></span>
            <span class="piece arm right"></span>
            <span class="piece body"></span>
            <span class="piece leg left"></span>
            <span class="piece leg right"></span>
            <span class="shadow"></span>
          </div>
        </div>
      </section>

      <h1>내 캐릭터</h1>
      <p class="subtitle" id="title">성실한 새싹 모험가</p>

      <section class="stats">
        <div class="stat"><span>EXP</span><strong id="exp">0</strong></div>
        <div class="stat"><span>기분</span><strong id="mood">준비</strong></div>
        <div class="stat"><span>오늘</span><strong id="count">0</strong></div>
      </section>

      <section class="actions" aria-label="1초 입력">
        <button data-points="7" data-label="운동">운동</button>
        <button data-points="8" data-label="공부">공부</button>
        <button data-points="5" data-label="정리">정리</button>
        <button data-points="6" data-label="수면">수면</button>
        <button data-points="4" data-label="행운">행운</button>
      </section>

      <div class="log" id="log">버튼을 누르면 캐릭터가 성장합니다.</div>
    </main>

    <script>
      const state = { exp: 0, count: 0 };
      const level = document.querySelector("#level");
      const exp = document.querySelector("#exp");
      const mood = document.querySelector("#mood");
      const count = document.querySelector("#count");
      const title = document.querySelector("#title");
      const log = document.querySelector("#log");

      document.querySelectorAll("button[data-points]").forEach((button) => {
        button.addEventListener("click", () => {
          const points = Number(button.dataset.points);
          state.exp += points;
          state.count += 1;

          level.textContent = String(Math.floor(state.exp / 30) + 1);
          exp.textContent = String(state.exp);
          mood.textContent = "뿌듯";
          count.textContent = String(state.count);
          title.textContent = state.exp >= 30 ? "반짝이는 루틴 모험가" : "성실한 새싹 모험가";
          log.textContent = `${button.dataset.label} 완료! 캐릭터가 +${points} 성장했어요.`;
        });
      });
    </script>
  </body>
</html>
