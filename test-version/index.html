<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>캐릭터 키우기 테스트</title>
    <style>
      :root {
        font-family: Arial, "Malgun Gothic", sans-serif;
        color: #243042;
        background: #f5f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 50% 10%, #fff5c9, transparent 34%),
          linear-gradient(140deg, #bde7ff, #fff7df 50%, #ffd6e9);
      }

      .phone {
        width: min(390px, calc(100vw - 24px));
        min-height: 760px;
        padding: 20px;
        border: 8px solid #27364d;
        border-radius: 34px;
        background: linear-gradient(#fffdf7, #eef8ff);
        box-shadow: 0 28px 80px rgba(28, 37, 55, 0.28);
        overflow: hidden;
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand {
        margin: 0;
        font-size: 13px;
        font-weight: 900;
        color: #5b6a7d;
      }

      .level {
        min-width: 74px;
        padding: 8px 10px;
        border-radius: 999px;
        background: #27364d;
        color: #fff;
        text-align: center;
        font-weight: 900;
      }

      .stage {
        display: grid;
        place-items: center;
        min-height: 380px;
        padding: 22px 0 10px;
        perspective: 900px;
      }

      .character-card {
        width: 260px;
        min-height: 340px;
        display: grid;
        place-items: center;
        border-radius: 28px;
        background: linear-gradient(180deg, #dff7ff 0%, #fff4bf 100%);
        box-shadow: inset 0 -18px 40px rgba(255, 181, 85, 0.25),
          0 20px 44px rgba(78, 95, 125, 0.18);
      }

      .character3d {
        position: relative;
        width: 154px;
        height: 260px;
        transform-style: preserve-3d;
        animation: floaty 3.4s ease-in-out infinite;
      }

      .part {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        box-shadow: inset -12px -12px 20px rgba(67, 47, 76, 0.14),
          inset 10px 10px 18px rgba(255, 255, 255, 0.55);
      }

      .hair {
        top: 8px;
        width: 112px;
        height: 88px;
        border-radius: 48% 52% 46% 46%;
        background: #6b4b3a;
        z-index: 1;
      }

      .head {
        top: 36px;
        width: 104px;
        height: 104px;
        border-radius: 44% 44% 48% 48%;
        background: #ffd9bc;
        z-index: 2;
      }

      .eye {
        position: absolute;
        top: 72px;
        width: 12px;
        height: 15px;
        border-radius: 50%;
        background: #293047;
        z-index: 4;
      }

      .eye.left {
        left: 51px;
      }

      .eye.right {
        right: 51px;
      }

      .cheek {
        position: absolute;
        top: 96px;
        width: 20px;
        height: 10px;
        border-radius: 999px;
        background: #ff9fba;
        opacity: 0.8;
        z-index: 4;
      }

      .cheek.left {
        left: 36px;
      }

      .cheek.right {
        right: 36px;
      }

      .smile {
        position: absolute;
        top: 102px;
        left: 68px;
        width: 20px;
        height: 12px;
        border-bottom: 3px solid #293047;
        border-radius: 0 0 999px 999px;
        z-index: 4;
      }

      .body {
        top: 136px;
        width: 112px;
        height: 94px;
        border-radius: 36px 36px 42px 42px;
        background: linear-gradient(135deg, #79dcff, #8d7dff);
        z-index: 2;
      }

      .arm {
        top: 148px;
        width: 34px;
        height: 86px;
        border-radius: 999px;
        background: #ffd9bc;
        z-index: 1;
      }

      .arm.left {
        left: 22px;
        transform: rotate(18deg);
      }

      .arm.right {
        left: auto;
        right: 22px;
        transform: rotate(-18deg);
      }

      .leg {
        top: 216px;
        width: 36px;
        height: 52px;
        border-radius: 18px;
        background: #5f6dff;
        z-index: 1;
      }

      .leg.left {
        left: 50px;
      }

      .leg.right {
        right: 50px;
        left: auto;
      }

      .shadow {
        position: absolute;
        left: 24px;
        bottom: -8px;
        width: 112px;
        height: 22px;
        border-radius: 999px;
        background: rgba(39, 54, 77, 0.16);
        filter: blur(2px);
      }

      h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 8px 0 18px;
        color: #6a7585;
        font-weight: 800;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 14px;
      }

      .stat {
        padding: 12px 8px;
        border: 1px solid #dce5f0;
        border-radius: 8px;
        background: #ffffffcc;
        text-align: center;
      }

      .stat span {
        display: block;
        color: #7b8798;
        font-size: 12px;
        font-weight: 900;
      }

      .stat strong {
        display: block;
        margin-top: 5px;
        font-size: 20px;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 7px;
      }

      button {
        min-height: 52px;
        border: 0;
        border-radius: 8px;
        background: #27364d;
        color: #fff;
        font-weight: 900;
        cursor: pointer;
      }

      button:active {
        transform: translateY(1px);
      }

      .log {
        margin-top: 14px;
        padding: 12px;
        border-radius: 8px;
        background: #fff;
        color: #5d6879;
        font-size: 14px;
        font-weight: 800;
      }

      @keyframes floaty {
        0%,
        100% {
          transform: rotateY(-8deg) translateY(0);
        }

        50% {
          transform: rotateY(8deg) translateY(-10px);
        }
      }
    </style>
  </head>
  <body>
    <main class="phone">
      <div class="top">
        <p class="brand">캐릭터 키우기 TEST</p>
        <div class="level">LV <span id="level">1</span></div>
      </div>

      <section class="stage" aria-label="메인 캐릭터 화면">
        <div class="character-card">
          <div class="character3d" aria-label="귀여운 3D 사람 캐릭터">
            <span class="part hair"></span>
            <span class="part head"></span>
            <span class="eye left"></span>
            <span class="eye right"></span>
            <span class="cheek left"></span>
            <span class="cheek right"></span>
            <span class="smile"></span>
            <span class="part arm left"></span>
            <span class="part arm right"></span>
            <span class="part body"></span>
            <span class="part leg left"></span>
            <span class="part leg right"></span>
            <span class="shadow"></span>
          </div>
        </div>
      </section>

      <h1>내 캐릭터</h1>
      <p class="subtitle" id="title">성실한 새싹 모험가</p>

      <section class="stats">
        <div class="stat"><span>EXP</span><strong id="exp">0</strong></div>
        <div class="stat"><span>기분</span><strong id="mood">준비</strong></div>
        <div class="stat"><span>오늘</span><strong id="count">0</strong></div>
      </section>

      <section class="actions" aria-label="1초 입력">
        <button data-points="7" data-label="운동">운동</button>
        <button data-points="8" data-label="공부">공부</button>
        <button data-points="5" data-label="정리">정리</button>
        <button data-points="6" data-label="수면">수면</button>
        <button data-points="4" data-label="행운">행운</button>
      </section>

      <div class="log" id="log">버튼을 누르면 캐릭터가 성장합니다.</div>
    </main>

    <script>
      const state = { exp: 0, count: 0 };
      const level = document.querySelector("#level");
      const exp = document.querySelector("#exp");
      const mood = document.querySelector("#mood");
      const count = document.querySelector("#count");
      const title = document.querySelector("#title");
      const log = document.querySelector("#log");

      document.querySelectorAll("button[data-points]").forEach((button) => {
        button.addEventListener("click", () => {
          const points = Number(button.dataset.points);
          state.exp += points;
          state.count += 1;

          level.textContent = String(Math.floor(state.exp / 30) + 1);
          exp.textContent = String(state.exp);
          mood.textContent = "뿌듯";
          count.textContent = String(state.count);
          title.textContent = state.exp >= 30 ? "반짝이는 루틴 모험가" : "성실한 새싹 모험가";
          log.textContent = `${button.dataset.label} 완료! 캐릭터가 +${points} 성장했어요.`;
        });
      });
    </script>
  </body>
</html>
